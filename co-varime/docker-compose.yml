version: "3.8"
services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:3000

  backend:
    build: ./backend
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MEALIE_URL=${MEALIE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - PORT=3000
      - WS_PORT=3001
    volumes:
      - ./data:/app/data
