<!DOCTYPE html>

<html lang="cs"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e0e3e5",
                    "on-surface": "#191c1e",
                    "secondary-fixed": "#6cff82",
                    "tertiary-container": "#8766aa",
                    "on-tertiary-fixed": "#29074a",
                    "on-error-container": "#93000a",
                    "surface-tint": "#005bc1",
                    "outline": "#717786",
                    "on-secondary-container": "#007328",
                    "on-primary-fixed-variant": "#004493",
                    "on-tertiary-container": "#fffbff",
                    "surface-container": "#eceef0",
                    "secondary-fixed-dim": "#47e266",
                    "on-secondary": "#ffffff",
                    "on-background": "#191c1e",
                    "error-container": "#ffdad6",
                    "background": "#f7f9fb",
                    "primary": "#0058bc",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#efdbff",
                    "on-secondary-fixed": "#002106",
                    "secondary-container": "#64fd7d",
                    "primary-container": "#0070eb",
                    "secondary": "#006e26",
                    "on-primary": "#ffffff",
                    "tertiary": "#6d4e8f",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f2f4f6",
                    "surface-bright": "#f7f9fb",
                    "primary-fixed-dim": "#adc6ff",
                    "inverse-primary": "#adc6ff",
                    "surface-container-high": "#e6e8ea",
                    "outline-variant": "#c1c6d7",
                    "on-primary-container": "#fefcff",
                    "surface": "#f7f9fb",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary-fixed": "#001a41",
                    "surface-dim": "#d8dadc",
                    "tertiary-fixed-dim": "#dbb8ff",
                    "primary-fixed": "#d8e2ff",
                    "inverse-surface": "#2d3133",
                    "inverse-on-surface": "#eff1f3",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#573878",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#414755",
                    "on-secondary-fixed-variant": "#00531a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
        }
        .brand-gradient {
            background: linear-gradient(135deg, #32ADE6, #30D158);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-orb-sky {
            background: radial-gradient(circle, rgba(50, 173, 230, 0.15) 0%, rgba(50, 173, 230, 0) 70%);
        }
        .bg-orb-purple {
            background: radial-gradient(circle, rgba(109, 78, 143, 0.15) 0%, rgba(109, 78, 143, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen relative overflow-x-hidden">
<!-- Ambient Background Orbs -->
<div class="fixed -top-40 -left-40 w-96 h-96 bg-orb-sky rounded-full blur-3xl -z-10"></div>
<div class="fixed -bottom-40 -right-40 w-96 h-96 bg-orb-purple rounded-full blur-3xl -z-10"></div>
<!-- Header from JSON Definition -->
<header class="bg-white/55 dark:bg-slate-900/55 backdrop-blur-2xl docked full-width top-0 sticky shadow-xl shadow-blue-900/5 z-50">
<div class="flex items-center px-6 h-20 w-full max-w-2xl mx-auto">
<button class="mr-4 text-blue-600 dark:text-blue-400 hover:bg-white/20 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-xl text-on-surface">Nastavení</h1>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 py-8 space-y-10 pb-20">
<!-- Section 1: Domácnost -->
<section>
<h2 class="font-headline font-bold text-lg mb-4 px-2 uppercase tracking-widest text-xs text-outline">Domácnost</h2>
<div class="space-y-3">
<!-- Member Card: Já -->
<div class="glass-card p-4 rounded-lg flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full brand-gradient flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/20">J</div>
<div>
<p class="font-semibold">Já</p>
<p class="text-xs text-outline font-medium uppercase tracking-wider">Administrátor</p>
</div>
</div>
<div class="flex gap-2">
<button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
</div>
</div>
<!-- Member Card: Zlatěna -->
<div class="glass-card p-4 rounded-lg flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-tertiary-container flex items-center justify-center text-white font-bold">Z</div>
<p class="font-semibold">Zlatěna</p>
</div>
<div class="flex gap-2">
<button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
<button class="p-2 text-outline hover:text-error transition-colors"><span class="material-symbols-outlined" data-icon="delete">delete</span></button>
</div>
</div>
<!-- Member Card: Nelča -->
<div class="glass-card p-4 rounded-lg flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-bold">N</div>
<p class="font-semibold">Nelča</p>
</div>
<div class="flex gap-2">
<button class="p-2 text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
<button class="p-2 text-outline hover:text-error transition-colors"><span class="material-symbols-outlined" data-icon="delete">delete</span></button>
</div>
</div>
<button class="w-full glass-card border-dashed border-2 border-outline-variant/30 p-4 rounded-lg flex items-center justify-center gap-2 font-semibold text-primary hover:bg-white/80 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="add">add</span>
                    Přidat člena
                </button>
</div>
</section>
<!-- Section 2: Připojení -->
<section>
<h2 class="font-headline font-bold text-lg mb-4 px-2 uppercase tracking-widest text-xs text-outline">Připojení</h2>
<div class="glass-card p-6 rounded-lg space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold px-1 text-on-surface-variant">Mealie URL</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" type="text" value="https://mealie.domov.cz"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold px-1 text-on-surface-variant">API Klíč</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" type="password" value="••••••••••••••••"/>
</div>
<button class="w-full py-4 rounded-lg bg-secondary/10 text-secondary font-bold flex items-center justify-center gap-2 hover:bg-secondary/20 transition-colors border border-secondary/20">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
                    Otestovat připojení
                </button>
</div>
</section>
<!-- Section 3: Výchozí nastavení -->
<section>
<h2 class="font-headline font-bold text-lg mb-4 px-2 uppercase tracking-widest text-xs text-outline">Výchozí nastavení</h2>
<div class="glass-card p-6 rounded-lg space-y-8">
<div class="space-y-4">
<label class="text-sm font-semibold text-on-surface-variant">Výchozí porce</label>
<div class="flex gap-2">
<button class="flex-1 py-3 rounded-lg brand-gradient text-white font-bold shadow-md shadow-blue-500/20">2</button>
<button class="flex-1 py-3 rounded-lg bg-surface-container-highest/50 font-semibold hover:bg-surface-container-highest transition-colors">4</button>
<button class="flex-1 py-3 rounded-lg bg-surface-container-highest/50 font-semibold hover:bg-surface-container-highest transition-colors">6</button>
<button class="flex-1 py-3 rounded-lg bg-surface-container-highest/50 font-semibold hover:bg-surface-container-highest transition-colors">8</button>
</div>
</div>
<div class="space-y-4">
<label class="text-sm font-semibold text-on-surface-variant">Výchozí nálada</label>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 rounded-full brand-gradient text-white text-xs font-bold uppercase tracking-wider shadow-sm">Rychlovka</span>
<span class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-xs font-bold uppercase tracking-wider">Komfortní</span>
<span class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-xs font-bold uppercase tracking-wider">Zdravé</span>
<span class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant text-xs font-bold uppercase tracking-wider">Víkendové</span>
</div>
</div>
</div>
</section>
<!-- Section 4: Vzhled -->
<section>
<h2 class="font-headline font-bold text-lg mb-4 px-2 uppercase tracking-widest text-xs text-outline">Vzhled</h2>
<div class="glass-card p-6 rounded-lg flex items-center justify-between">
<div>
<p class="font-bold">Režim</p>
<p class="text-sm text-outline">Aktuálně nastaven Světlý</p>
</div>
<div class="flex bg-surface-container p-1 rounded-full w-48 relative">
<button class="z-10 flex-1 py-2 text-xs font-bold uppercase tracking-widest text-on-surface">Světlý</button>
<button class="z-10 flex-1 py-2 text-xs font-bold uppercase tracking-widest text-outline">Tmavý</button>
<div class="absolute left-1 top-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-full shadow-sm transition-all duration-300"></div>
</div>
</div>
</section>
<!-- Section 5: O aplikaci -->
<section>
<h2 class="font-headline font-bold text-lg mb-4 px-2 uppercase tracking-widest text-xs text-outline">O aplikaci</h2>
<div class="glass-card p-6 rounded-lg space-y-4">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-medium">Verze</span>
<span class="font-bold text-primary">1.2.0</span>
</div>
<div class="h-px bg-outline-variant/10"></div>
<a class="flex justify-between items-center group" href="#">
<span class="text-on-surface-variant font-medium group-hover:text-primary transition-colors">GitHub repozitář</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="open_in_new">open_in_new</span>
</a>
</div>
</section>
<div class="pt-8 text-center">
<img alt="Kitchen tools" class="w-full h-32 object-cover rounded-xl opacity-40 grayscale hover:grayscale-0 transition-all duration-700" data-alt="Modern minimalist kitchen detail with marble countertop, artisan ceramic pots, and soft morning light through a window" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABgpXIQy8fD91qpoP7BOO18jS2LXr6WWGxTR8oV2bFN6nIq0Rc6oCfRdS6VK3PbfRN6StoMaZeo4I58KHaciwuEXs2FwdBvLytsSYG-SA7XQH-xtxlBc9Io29EMlPydPzey_f98quNN7LfBWG8yPSwSe2zruM5qoiRyeGausb56gk8GCht8hCUweX7OJViq86GnSPULXy24ss-HBUEBjkzUMiuz8IgJ7MlXWxrP1XLt0A5P2ROvHaAOcHVh0C_Pp_XQYk14KzyKck"/>
<p class="mt-6 text-xs text-outline font-bold uppercase tracking-[0.2em]">S láskou uvařeno v 2024</p>
</div>
</main>
</body></html>
